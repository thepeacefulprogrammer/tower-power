<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Power</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="pane-grid">
      <section class="pane-viewport" id="pane-a-viewport">
        <div class="pane-stage">
          <div class="pane-frame">
            <iframe
              id="device-a"
              title="LD Cloud device A"
              allow="clipboard-read; clipboard-write; fullscreen"
              loading="eager"
              referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
          </div>
        </div>
      </section>
      <section class="pane-viewport" id="pane-b-viewport">
        <div class="pane-stage">
          <div class="pane-frame">
            <iframe
              id="device-b"
              title="LD Cloud device B"
              allow="clipboard-read; clipboard-write; fullscreen"
              loading="eager"
              referrerpolicy="strict-origin-when-cross-origin"
            ></iframe>
          </div>
        </div>
      </section>
    </main>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
